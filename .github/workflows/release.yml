name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Start9 build environment
        uses: start9labs/shared-workflows/.github/actions/setup-build-env@master

      - name: Generate developer signing key
        run: start-cli init-key

      - name: Build .s9pk artifacts
        run: RUST_BACKTRACE=1 make

      - name: Generate SHA256 checksums
        run: sha256sum *.s9pk > SHA256SUMS

      - name: Publish GitHub release with .s9pk artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.s9pk
            SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
