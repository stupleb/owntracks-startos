name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Start9 build environment
        uses: start9labs/shared-workflows/.github/actions/setup-build-env@master

      - name: Install developer signing key
        env:
          DEV_KEY: ${{ secrets.DEV_KEY }}
        run: |
          # Use the DEV_KEY repo secret when present so every release is
          # signed by the same key. Fall back to a freshly generated key
          # otherwise, so the workflow still works on a fresh fork.
          if [ -n "$DEV_KEY" ]; then
            mkdir -p ~/.startos
            printf '%s' "$DEV_KEY" > ~/.startos/developer.key.pem
            chmod 600 ~/.startos/developer.key.pem
          else
            start-cli init-key
          fi

      - name: Build .s9pk artifacts
        run: RUST_BACKTRACE=1 make

      - name: Generate SHA256 checksums
        run: sha256sum *.s9pk > SHA256SUMS

      - name: Publish GitHub release with .s9pk artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.s9pk
            SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
